<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Birthday Surprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ff4d6d;
            --gold: #ffd700;
            --violet: #7209b7;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f0c29;
            background: linear-gradient(to bottom, #24243e, #302b63, #0f0c29);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* --- Input Modal Styling --- */
        #setup-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 12, 41, 0.95);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .setup-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 320px;
            text-align: center;
            box-shadow: 0 0 30px var(--pink);
        }

        .setup-box h2 { color: var(--pink); font-family: 'Dancing Script'; font-size: 2rem; }
        
        .setup-box input, .setup-box textarea {
            width: 100%;
            margin: 10px 0;
            padding: 10px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-family: inherit;
            box-sizing: border-box;
        }

        .setup-box button {
            background: var(--pink);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        /* --- Your Original Card Design --- */
        .stars { position: absolute; width: 100%; height: 100%; pointer-events: none; }

        .envelope {
            position: relative;
            width: 380px;
            height: 550px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(255, 77, 109, 0.5);
            perspective: 1000px;
            transition: 1s;
            display: none; /* Hidden until form is submitted */
        }

        .door {
            position: absolute;
            top: 0; width: 50%; height: 100%;
            background: var(--pink);
            z-index: 10;
            transition: 1.2s cubic-bezier(0.7, 0, 0.3, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            flex-direction: column;
        }

        .door-left { left: 0; border-radius: 20px 0 0 20px; border-right: 1px solid rgba(255,255,255,0.3); }
        .door-right { right: 0; border-radius: 0 20px 20px 0; border-left: 1px solid rgba(255,255,255,0.3); }

        .envelope:hover .door-left { transform: translateX(-100%); }
        .envelope:hover .door-right { transform: translateX(100%); }

        .cake-container { margin: 20px auto; font-size: 60px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .content {
            padding: 25px; text-align: center; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            background: white; border-radius: 20px;
        }

        h1 { font-family: 'Dancing Script', cursive; color: var(--pink); font-size: 2.2rem; margin: 0; }

        .sorry-box {
            background: #fff0f3; border-left: 4px solid var(--pink);
            padding: 10px; margin: 15px 0; font-size: 0.85rem;
            color: #c9184a; text-align: left; border-radius: 5px;
        }

        .message-text {
            font-size: 0.9rem; line-height: 1.5; color: #444;
            max-height: 180px; overflow-y: auto; padding-right: 5px; text-align: left;
        }

        .magic-btn {
            background: var(--pink); color: white; border: none;
            padding: 12px 25px; border-radius: 50px; font-weight: bold;
            margin-top: 15px; cursor: pointer; transition: 0.3s;
        }

        .floating { position: absolute; bottom: -50px; animation: floatUp 5s linear infinite; opacity: 0; z-index: 1; }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="setup-overlay">
        <div class="setup-box">
            <h2>Create Magic ✨</h2>
            <input type="text" id="input-name" placeholder="Bday Boy/Girl Name...">
            <textarea id="input-msg" rows="4" placeholder="Apna pyaara sa message likho..."></textarea>
            <button onclick="generateCard()">Create Card ❤️</button>
        </div>
    </div>

    <div class="stars" id="star-container"></div>

    <div class="envelope" id="main-card">
        <div class="door door-left">
            <span style="font-size: 40px;">🎁</span>
            <p>For You</p>
        </div>
        <div class="door door-right">
            <span style="font-size: 40px;">🎂</span>
            <p id="label-role">Special One</p>
        </div>

        <div class="content">
            <div class="cake-container">🎂</div>
            <h1 id="display-name">Happy Birthday!</h1>
            
            <div class="sorry-box">
                <strong>Ek Choti Si Note:</strong> Ye card special aapke liye banaya gaya hai! Hope it brings a smile to your face. 😊
            </div>

            <div class="message-text">
                <p id="display-msg"></p>
            </div>

            <button class="magic-btn" onclick="startCelebration()">Magical Wish ✨</button>
        </div>
    </div>

    <script>
        // Function to Generate Card with User Inputs
        function generateCard() {
            const name = document.getElementById('input-name').value;
            const msg = document.getElementById('input-msg').value;

            if(name.trim() === "" || msg.trim() === "") {
                alert("Please enter both Name and Message!");
                return;
            }

            // Set the dynamic values
            document.getElementById('display-name').innerText = "Happy Birthday, " + name + "!";
            document.getElementById('display-msg').innerText = msg;
            document.getElementById('label-role').innerText = name;

            // Hide form and show card
            document.getElementById('setup-overlay').style.display = 'none';
            document.getElementById('main-card').style.display = 'block';
        }

        // --- Original Star/Floating/Celebration Scripts ---
        function createStars() {
            const container = document.getElementById('star-container');
            for(let i=0; i<100; i++) {
                const star = document.createElement('div');
                star.style.position = 'absolute';
                star.style.width = '2px';
                star.style.height = '2px';
                star.style.background = '#fff';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.opacity = Math.random();
                container.appendChild(star);
            }
        }
        createStars();

        function spawnFloating() {
            const icons = ['❤️', '✨', '🌸', '🎈', '🍫'];
            const icon = document.createElement('div');
            icon.className = 'floating';
            icon.innerHTML = icons[Math.floor(Math.random() * icons.length)];
            icon.style.left = Math.random() * 100 + 'vw';
            icon.style.fontSize = Math.random() * 20 + 15 + 'px';
            icon.style.animationDuration = Math.random() * 3 + 4 + 's';
            document.body.appendChild(icon);
            setTimeout(() => icon.remove(), 6000);
        }
        setInterval(spawnFloating, 400);

        function startCelebration() {
            const name = document.getElementById('input-name').value;
            for(let i=0; i<80; i++) {
                const p = document.createElement('div');
                p.style.position = 'fixed';
                p.style.width = '10px'; p.style.height = '10px';
                p.style.backgroundColor = ['#ff4d6d', '#ffd700', '#00f2ff', '#fff'][Math.floor(Math.random()*4)];
                p.style.left = '50%'; p.style.top = '50%';
                p.style.borderRadius = '50%'; p.style.zIndex = '100';
                document.body.appendChild(p);

                const angle = Math.random() * Math.PI * 2;
                const velocity = 5 + Math.random() * 10;
                const vx = Math.cos(angle) * velocity * 20;
                const vy = Math.sin(angle) * velocity * 20;

                p.animate([
                    { transform: 'translate(0,0) scale(1)', opacity: 1 },
                    { transform: `translate(${vx}px, ${vy}px) scale(0)`, opacity: 0 }
                ], { duration: 2000, easing: 'cubic-bezier(0.1, 1, 0.1, 1)' }).onfinish = () => p.remove();
            }
            alert(name + ", You are the best! 🍰✨ Enjoy your day!");
        }
    </script>
</body>
</html>
